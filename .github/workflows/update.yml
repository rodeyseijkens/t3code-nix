name: Auto Update

on:
  schedule:
    - cron: '*/120 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Check for updates
        id: check
        run: |
          API_RESPONSE=$(curl -sL "https://api.github.com/repos/pingdotgg/t3code/releases/latest")
          VERSION=$(echo "$API_RESPONSE" | jq -r '.tag_name' | sed 's/^v//')
          DOWNLOAD_URL="https://github.com/pingdotgg/t3code/releases/download/v${VERSION}/T3-Code-${VERSION}-x86_64.AppImage"

          CURRENT=$(grep 'version = ' package.nix | head -1 | sed 's/.*"\(.*\)".*/\1/')

          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "latest=$VERSION" >> $GITHUB_OUTPUT
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT

          if [ "$VERSION" != "$CURRENT" ]; then
            echo "needs_update=true" >> $GITHUB_OUTPUT
          else
            echo "needs_update=false" >> $GITHUB_OUTPUT
          fi

      - name: Update package
        if: steps.check.outputs.needs_update == 'true'
        run: |
          VERSION="${{ steps.check.outputs.latest }}"
          DOWNLOAD_URL="${{ steps.check.outputs.download_url }}"

          HASH=$(nix-prefetch-url "$DOWNLOAD_URL" 2>/dev/null)
          SRI_HASH=$(nix hash convert --to sri --hash-algo sha256 "$HASH")

          if [[ ! "$SRI_HASH" =~ ^sha256- ]]; then
            echo "ERROR: Invalid SRI hash: $SRI_HASH"
            exit 1
          fi

          echo "New hash: $SRI_HASH"

          sed -i "s/version = \"[^\"]*\"/version = \"$VERSION\"/" package.nix
          sed -i "s|hash = \"sha256-[^\"]*\"|hash = \"$SRI_HASH\"|" package.nix

          git diff package.nix

      - name: Test build
        if: steps.check.outputs.needs_update == 'true'
        run: |
          nix build .#t3code --accept-flake-config --impure

      - name: Commit and push
        if: steps.check.outputs.needs_update == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.nix
          git commit -m "Update t3code to ${{ steps.check.outputs.latest }}"
          git push

      - name: Create Release
        if: steps.check.outputs.needs_update == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.check.outputs.latest }}" \
            --title "t3code ${{ steps.check.outputs.latest }}" \
            --notes "Updated t3code from ${{ steps.check.outputs.current }} to ${{ steps.check.outputs.latest }}"
